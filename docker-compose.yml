version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: driveiq
      POSTGRES_USER: driveiq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driveiq"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  orchestrator:
    build:
      context: ./apps/orchestrator
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://driveiq:${POSTGRES_PASSWORD:-localpass}@postgres:5432/driveiq
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/orchestrator:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  backend:
    build:
      context: ./apps/backend
    ports:
      - "8080:8080"
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8000
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: jdbc:postgresql://postgres:5432/driveiq
      POSTGRES_USER: driveiq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpass}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-in-prod-min-32chars}
    depends_on:
      - orchestrator

  frontend:
    build:
      context: ./apps/frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  postgres_data:
