name: CI — Test + Eval Gate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Java — Spring Boot Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
      - run: mvn test -B
      - run: mvn checkstyle:check -B

  test-orchestrator:
    name: Python — Tests + Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt pytest pytest-asyncio ruff
      - run: ruff check .
      - run: pytest tests/ -v --tb=short

  eval-gate:
    name: Agent Evals — Deploy Gate
    runs-on: ubuntu-latest
    needs: test-orchestrator   # only run evals if unit tests pass first
    defaults:
      run:
        working-directory: apps/orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run agent eval suite
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m evals.run_evals --agent all
          # Exit code 1 blocks the deploy
      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: apps/orchestrator/evals/results/

  test-frontend:
    name: TypeScript — Lint + Type Check + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
      - run: terraform init -backend=false
      - run: terraform validate
      - run: terraform fmt -check -recursive
